name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allows manually triggering a deploy from the Actions tab
  workflow_dispatch:

# Only one deploy at a time — cancel any in-progress run if a new one starts
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine base path
        id: base
        run: |
          # Custom domain (public/CNAME present) or a username.github.io
          # user/org repo → site is served from "/". Otherwise it's a
          # project site → served from "/repo-name/".
          if [ -f "public/CNAME" ] || [[ "${{ github.event.repository.name }}" == *.github.io ]]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          BASE_PATH: ${{ steps.base.outputs.path }}
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
